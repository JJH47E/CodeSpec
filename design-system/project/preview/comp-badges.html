<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-sans);background:var(--bg-surface);color:var(--fg-default);padding:22px 24px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  svg{display:block;}
  .btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-sans);font-size:var(--text-sm);font-weight:500;
       border-radius:var(--radius-md);padding:7px 13px;border:1px solid transparent;cursor:pointer;line-height:1;}
  .btn-primary{background:var(--accent-emphasis);color:var(--fg-on-accent);}
  .btn-secondary{background:var(--bg-surface);color:var(--fg-default);border-color:var(--border-default);box-shadow:var(--shadow-xs);}
  .btn-ghost{background:transparent;color:var(--fg-default);}
  .btn-danger{background:var(--danger-emphasis);color:#fff;}
  .btn-sm{font-size:var(--text-xs);padding:5px 10px;}
  .btn-lg{font-size:var(--text-base);padding:9px 16px;}
  .lbl{font-size:10px;font-family:var(--font-mono);color:var(--fg-faint);margin-bottom:7px;}
  
  .pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--radius-full);font-size:11.5px;font-weight:500;}
  .tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--radius-sm);font-size:11px;font-weight:500;font-family:var(--font-mono);
       background:var(--bg-subtle);color:var(--fg-muted);border:1px solid var(--border-muted);}
  .count{min-width:18px;height:18px;padding:0 5px;border-radius:var(--radius-full);background:var(--accent-emphasis);color:#fff;font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;}

</style>
</head>
<body>

  <div style="display:flex;flex-direction:column;gap:16px">
    <div><div class="lbl">STATUS PILLS</div><div class="row">
      <span class="pill" style="color:var(--success-fg);background:var(--success-muted)"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="12" cy="12" r="9"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.2 12.2 11 15l4.8-5.8"/></g></svg>Applied</span>
      <span class="pill" style="color:var(--warning-fg);background:var(--warning-muted)"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><path d="M12 3.5 22 20H2z"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 21 19.5a1 1 0 0 1-.9 1.5H3.9A1 1 0 0 1 3 19.5z"/><path d="M12 9.5v4.5"/><path d="M12 17h.01"/></g></svg>Needs review</span>
      <span class="pill" style="color:var(--danger-fg);background:var(--danger-muted)"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="12" cy="12" r="9"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/></g></svg>Failed</span>
    </div></div>
    <div><div class="lbl">META TAGS + COUNT</div><div class="row">
      <span class="tag">spec</span><span class="tag">v0.4.2</span><span class="tag"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="6" cy="6" r="2.6"/><circle cx="6" cy="18" r="2.6"/><circle cx="18" cy="7" r="2.6"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.6"/><circle cx="6" cy="18" r="2.6"/><circle cx="18" cy="7" r="2.6"/><path d="M6 8.6v6.8"/><path d="M18 9.6c0 4-3.6 4.4-6 5.4"/></g></svg>main</span>
      <span class="count">3</span>
    </div></div>
  </div>
</body>
</html>
