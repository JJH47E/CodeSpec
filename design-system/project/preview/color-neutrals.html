<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-sans);background:var(--bg-surface);color:var(--fg-default);padding:22px 24px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:46px;border-radius:var(--radius-md);border:1px solid rgba(16,24,40,.08);}
  .nm{font-size:11px;font-weight:600;color:var(--fg-default);font-family:var(--font-mono);}
  .hx{font-size:10.5px;color:var(--fg-subtle);font-family:var(--font-mono);}
  
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#ffffff;"></div>
    <div class="nm">0</div><div class="hx">#ffffff</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#fbfcfd;"></div>
    <div class="nm">25</div><div class="hx">#fbfcfd</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#f6f8fa;"></div>
    <div class="nm">50</div><div class="hx">#f6f8fa</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#eef1f4;"></div>
    <div class="nm">100</div><div class="hx">#eef1f4</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#e6eaee;"></div>
    <div class="nm">150</div><div class="hx">#e6eaee</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#dce1e7;"></div>
    <div class="nm">200</div><div class="hx">#dce1e7</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#c8cfd7;"></div>
    <div class="nm">300</div><div class="hx">#c8cfd7</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#a5aeb8;"></div>
    <div class="nm">400</div><div class="hx">#a5aeb8</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#79828d;"></div>
    <div class="nm">500</div><div class="hx">#79828d</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#5b6470;"></div>
    <div class="nm">600</div><div class="hx">#5b6470</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#404853;"></div>
    <div class="nm">700</div><div class="hx">#404853</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#2b323b;"></div>
    <div class="nm">800</div><div class="hx">#2b323b</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#1a1f26;"></div>
    <div class="nm">900</div><div class="hx">#1a1f26</div>
  </div>
  <div class="sw" style="width:46px">
    <div class="chip" style="background:#0e1116;"></div>
    <div class="nm">950</div><div class="hx">#0e1116</div>
  </div></div><div style="margin-top:14px;font-size:12px;color:var(--fg-muted)">Cool neutral ramp — carries ~90% of every screen. App shell sits at <code style="font-family:var(--font-mono)">50</code>, surfaces at <code style="font-family:var(--font-mono)">0</code>.</div>
</body>
</html>
