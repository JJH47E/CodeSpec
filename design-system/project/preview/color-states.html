<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box}body{margin:0;font-family:var(--font-sans);background:var(--bg-surface);color:var(--fg-default);padding:22px 24px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:var(--radius-full);font-size:12px;font-weight:500}</style></head><body>
  <div class="row" style="gap:10px;align-items:center">
    <span class="pill" style="color:var(--state-draft-fg);background:var(--state-draft-bg)"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><path d="M5 19l1-4L16 5l3 3L9 18z"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5.5 18.5 10"/><path d="M5 19l1-4L16 5a1.4 1.4 0 0 1 2 0l1 1a1.4 1.4 0 0 1 0 2L9 18z"/></g></svg>Draft</span>
    <span class="pill" style="color:var(--state-proposed-fg);background:var(--state-proposed-bg)"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="6" cy="6" r="2.6"/><circle cx="6" cy="18" r="2.6"/><circle cx="18" cy="18" r="2.6"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.6"/><circle cx="6" cy="18" r="2.6"/><circle cx="18" cy="18" r="2.6"/><path d="M6 8.6v6.8"/><path d="M18 15.4V11a4 4 0 0 0-4-4h-3.2"/><path d="M13 4.8 10.2 7 13 9.2"/></g></svg>Proposed</span>
    <span class="pill" style="color:var(--state-partial-fg);background:var(--state-partial-bg)"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="12" cy="12" r="9"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 12 L12 3 A9 9 0 0 1 12 21 Z" fill="currentColor" stroke="none"/></g></svg>Partial</span>
    <span class="pill" style="color:var(--state-applied-fg);background:var(--state-applied-bg)"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="12" cy="12" r="9"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.2 12.2 11 15l4.8-5.8"/></g></svg>Applied</span>
    <span class="pill" style="color:var(--state-archived-fg);background:var(--state-archived-bg)"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><rect x="3.5" y="4.5" width="17" height="4" rx="1"/><rect x="5" y="8.5" width="14" height="11" rx="1.5"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="4" rx="1"/><path d="M5 8.5h14v9.5a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 5 18z"/><path d="M10 12h4"/></g></svg>Archived</span>
  </div>
  <div style="margin-top:16px;font-size:12px;color:var(--fg-muted)">OpenSpec change lifecycle: <code style="font-family:var(--font-mono)">draft → proposed → <b style="color:var(--state-partial-fg)">partial</b> → applied → archived</code>. <b>Partial</b> (amber) covers a change where some apply tasks landed and others didn't. Each maps to a duotone icon + <code style="font-family:var(--font-mono)">--state-*-fg/-bg</code> pair.</div>
</body></html>
