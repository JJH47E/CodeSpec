<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-sans);background:var(--bg-surface);color:var(--fg-default);padding:22px 24px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:46px;border-radius:var(--radius-md);border:1px solid rgba(16,24,40,.08);}
  .nm{font-size:11px;font-weight:600;color:var(--fg-default);font-family:var(--font-mono);}
  .hx{font-size:10.5px;color:var(--fg-subtle);font-family:var(--font-mono);}
  
</style>
</head>
<body>

  <div class="col" style="gap:11px">
    <div style="display:flex;align-items:baseline;gap:14px"><span style="font-size:10px;color:var(--fg-faint);font-family:var(--font-mono);width:96px">display · 36/600</span><span class="cs-display">Specs, in view</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="font-size:10px;color:var(--fg-faint);font-family:var(--font-mono);width:96px">h1 · 24/600</span><span class="cs-h1">Open changes</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="font-size:10px;color:var(--fg-faint);font-family:var(--font-mono);width:96px">h2 · 20/600</span><span class="cs-h2">Add auth flow</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="font-size:10px;color:var(--fg-faint);font-family:var(--font-mono);width:96px">h3 · 16/600</span><span class="cs-h3">Tasks</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="font-size:10px;color:var(--fg-faint);font-family:var(--font-mono);width:96px">body · 14/400</span><span class="cs-body">Propose a spec, review it, then apply.</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="font-size:10px;color:var(--fg-faint);font-family:var(--font-mono);width:96px">caption · 12</span><span class="cs-caption">Updated 4 minutes ago</span></div>
  </div>
</body>
</html>
