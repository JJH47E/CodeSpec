<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-sans);background:var(--bg-surface);color:var(--fg-default);padding:22px 24px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:46px;border-radius:var(--radius-md);border:1px solid rgba(16,24,40,.08);}
  .nm{font-size:11px;font-weight:600;color:var(--fg-default);font-family:var(--font-mono);}
  .hx{font-size:10.5px;color:var(--fg-subtle);font-family:var(--font-mono);}
  
</style>
</head>
<body>

  <div class="col" style="gap:13px">
    <div><span class="cs-overline">OVERLINE LABEL</span></div>
    <div><span class="cs-label">Label — form field name</span></div>
    <div><span class="cs-body-sm">Body small — secondary descriptions, helper text under inputs.</span></div>
    <div style="background:var(--bg-inset);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:8px 10px"><span class="cs-code">npx openspec propose "add-auth"</span></div>
    <div style="font-size:12px;color:var(--fg-muted)">Weights: <b style="font-weight:400">400 regular</b> · <b style="font-weight:450">450 book</b> · <b style="font-weight:500">500 medium</b> · <b style="font-weight:600">600 semibold</b></div>
  </div>
</body>
</html>
