<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-sans);background:var(--bg-surface);color:var(--fg-default);padding:22px 24px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-sans);font-size:var(--text-sm);font-weight:500;
       border-radius:var(--radius-md);padding:7px 13px;border:1px solid transparent;cursor:pointer;line-height:1;}
  .btn i{font-size:15px;}
  .btn-primary{background:var(--accent-emphasis);color:var(--fg-on-accent);}
  .btn-secondary{background:var(--bg-surface);color:var(--fg-default);border-color:var(--border-default);box-shadow:var(--shadow-xs);}
  .btn-ghost{background:transparent;color:var(--fg-default);}
  .btn-danger{background:var(--danger-emphasis);color:#fff;}
  .btn-sm{font-size:var(--text-xs);padding:5px 10px;}
  .btn-lg{font-size:var(--text-base);padding:9px 16px;}
  .lbl{font-size:10px;font-family:var(--font-mono);color:var(--fg-faint);margin-bottom:7px;}
  
</style>
</head>
<body>

  <div class="col" style="display:flex;flex-direction:column;gap:18px">
    <div><div class="lbl">SIZES</div><div class="row">
      <button class="btn btn-secondary btn-sm">Small</button>
      <button class="btn btn-secondary">Medium</button>
      <button class="btn btn-secondary btn-lg">Large</button>
    </div></div>
    <div><div class="lbl">STATES (primary)</div><div class="row">
      <button class="btn btn-primary">Default</button>
      <button class="btn btn-primary" style="background:var(--accent-emphasis-hover)">Hover</button>
      <button class="btn btn-primary" style="background:var(--accent-emphasis-active)">Active</button>
      <button class="btn btn-primary" style="box-shadow:var(--ring)">Focus</button>
      <button class="btn btn-primary" style="opacity:.45">Disabled</button>
    </div></div>
  </div>
</body>
</html>
