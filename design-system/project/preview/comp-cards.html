<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box}body{margin:0;font-family:var(--font-sans);background:var(--bg-surface);color:var(--fg-default);padding:22px 24px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:var(--radius-full);font-size:12px;font-weight:500}
.card{width:340px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:var(--shadow-xs);overflow:hidden}
.card-row{display:flex;align-items:center;gap:11px;padding:12px 15px}
.card-row.sel{background:var(--bg-selected);border-left:2px solid var(--accent-emphasis);padding-left:13px}
.ico{width:30px;height:30px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;background:var(--accent-subtle);color:var(--accent-fg);flex:none}
.ttl{font-size:var(--text-sm);font-weight:600;color:var(--fg-default)}
.sub{font-size:var(--text-xs);color:var(--fg-subtle);font-family:var(--font-mono);margin-top:2px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:var(--radius-full);font-size:11px;font-weight:500;margin-left:auto}
.sep{height:1px;background:var(--border-muted)}
</style></head><body>
  <div class="card">
    <div class="card-row">
      <div class="ico"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="6" cy="6" r="2.6"/><circle cx="6" cy="18" r="2.6"/><circle cx="18" cy="18" r="2.6"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.6"/><circle cx="6" cy="18" r="2.6"/><circle cx="18" cy="18" r="2.6"/><path d="M6 8.6v6.8"/><path d="M18 15.4V11a4 4 0 0 0-4-4h-3.2"/><path d="M13 4.8 10.2 7 13 9.2"/></g></svg></div>
      <div><div class="ttl">add-auth-flow</div><div class="sub">3 specs · 7 tasks</div></div>
      <span class="pill" style="color:var(--state-proposed-fg);background:var(--state-proposed-bg)"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="6" cy="6" r="2.6"/><circle cx="6" cy="18" r="2.6"/><circle cx="18" cy="18" r="2.6"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.6"/><circle cx="6" cy="18" r="2.6"/><circle cx="18" cy="18" r="2.6"/><path d="M6 8.6v6.8"/><path d="M18 15.4V11a4 4 0 0 0-4-4h-3.2"/><path d="M13 4.8 10.2 7 13 9.2"/></g></svg>Proposed</span>
    </div><div class="sep"></div>
    <div class="card-row">
      <div class="ico" style="background:var(--warning-subtle);color:var(--warning-fg)"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="12" cy="12" r="9"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 12 L12 3 A9 9 0 0 1 12 21 Z" fill="currentColor" stroke="none"/></g></svg></div>
      <div><div class="ttl">split-billing-svc</div><div class="sub">4 of 9 tasks applied</div></div>
      <span class="pill" style="color:var(--state-partial-fg);background:var(--state-partial-bg)"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="12" cy="12" r="9"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 12 L12 3 A9 9 0 0 1 12 21 Z" fill="currentColor" stroke="none"/></g></svg>Partial</span>
    </div><div class="sep"></div>
    <div class="card-row sel">
      <div class="ico" style="background:var(--success-subtle);color:var(--success-fg)"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="12" cy="12" r="9"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.2 12.2 11 15l4.8-5.8"/></g></svg></div>
      <div><div class="ttl">refactor-db-layer</div><div class="sub">2 specs · 12 tasks</div></div>
      <span class="pill" style="color:var(--state-applied-fg);background:var(--state-applied-bg)"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:none"><g fill="currentColor" stroke="none" opacity="0.2"><circle cx="12" cy="12" r="9"/></g><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.2 12.2 11 15l4.8-5.8"/></g></svg>Applied</span>
    </div>
  </div>
  <div style="margin-top:14px;font-size:12px;color:var(--fg-muted)">List card / change row. Selected row gets a wash + 2px accent left-bar.</div>
</body></html>
