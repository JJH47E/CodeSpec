<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-sans);background:var(--bg-surface);color:var(--fg-default);padding:22px 24px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:46px;border-radius:var(--radius-md);border:1px solid rgba(16,24,40,.08);}
  .nm{font-size:11px;font-weight:600;color:var(--fg-default);font-family:var(--font-mono);}
  .hx{font-size:10.5px;color:var(--fg-subtle);font-family:var(--font-mono);}
  
</style>
</head>
<body>

  <div class="col" style="gap:18px">
    <div>
      <div style="font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--fg-subtle);margin-bottom:6px">GEIST · UI</div>
      <div style="font-size:34px;font-weight:600;letter-spacing:-.01em;line-height:1.1">Propose a change</div>
      <div style="font-size:13px;color:var(--fg-muted);font-family:var(--font-mono);margin-top:6px">400 · 450 · 500 · 600 &nbsp; aAbBgG 0123 — &amp; @</div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--fg-subtle);margin-bottom:6px">GEIST MONO · CODE</div>
      <div style="font-size:24px;font-family:var(--font-mono);line-height:1.2">openspec apply --change</div>
      <div style="font-size:13px;color:var(--fg-muted);font-family:var(--font-mono);margin-top:6px">400 · 500 · 600 &nbsp; il1 O0 {} =&gt; () []</div>
    </div>
  </div>
</body>
</html>
