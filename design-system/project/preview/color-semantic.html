<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-sans);background:var(--bg-surface);color:var(--fg-default);padding:22px 24px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:46px;border-radius:var(--radius-md);border:1px solid rgba(16,24,40,.08);}
  .nm{font-size:11px;font-weight:600;color:var(--fg-default);font-family:var(--font-mono);}
  .hx{font-size:10.5px;color:var(--fg-subtle);font-family:var(--font-mono);}
  
</style>
</head>
<body>

  <div class="col" style="gap:18px">
    <div><div style="font-size:11px;font-weight:600;color:var(--success-fg);margin-bottom:8px">SUCCESS · green</div><div class="row">
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#e9f6ef;"></div>
    <div class="nm">subtle</div><div class="hx">#e9f6ef</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#cdebda;"></div>
    <div class="nm">muted</div><div class="hx">#cdebda</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#1f8a5b;"></div>
    <div class="nm">emphasis</div><div class="hx">#1f8a5b</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#167049;"></div>
    <div class="nm">fg</div><div class="hx">#167049</div>
  </div></div></div>
    <div><div style="font-size:11px;font-weight:600;color:var(--warning-fg);margin-bottom:8px">WARNING · amber</div><div class="row">
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#fbf2e2;"></div>
    <div class="nm">subtle</div><div class="hx">#fbf2e2</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#f6e2bd;"></div>
    <div class="nm">muted</div><div class="hx">#f6e2bd</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#b8730a;"></div>
    <div class="nm">emphasis</div><div class="hx">#b8730a</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#98600a;"></div>
    <div class="nm">fg</div><div class="hx">#98600a</div>
  </div></div></div>
    <div><div style="font-size:11px;font-weight:600;color:var(--danger-fg);margin-bottom:8px">DANGER · red</div><div class="row">
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#fceceb;"></div>
    <div class="nm">subtle</div><div class="hx">#fceceb</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#f8d4d0;"></div>
    <div class="nm">muted</div><div class="hx">#f8d4d0</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#c4392e;"></div>
    <div class="nm">emphasis</div><div class="hx">#c4392e</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#a32a22;"></div>
    <div class="nm">fg</div><div class="hx">#a32a22</div>
  </div></div></div>
  </div>
</body>
</html>
