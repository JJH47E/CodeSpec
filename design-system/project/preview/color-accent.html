<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-sans);background:var(--bg-surface);color:var(--fg-default);padding:22px 24px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:46px;border-radius:var(--radius-md);border:1px solid rgba(16,24,40,.08);}
  .nm{font-size:11px;font-weight:600;color:var(--fg-default);font-family:var(--font-mono);}
  .hx{font-size:10.5px;color:var(--fg-subtle);font-family:var(--font-mono);}
  
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#eef4fd;"></div>
    <div class="nm">50</div><div class="hx">#eef4fd</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#d8e6fb;"></div>
    <div class="nm">100</div><div class="hx">#d8e6fb</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#b3cdf6;"></div>
    <div class="nm">200</div><div class="hx">#b3cdf6</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#84acf0;"></div>
    <div class="nm">300</div><div class="hx">#84acf0</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#5189e8;"></div>
    <div class="nm">400</div><div class="hx">#5189e8</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#2a6fdb;"></div>
    <div class="nm">500</div><div class="hx">#2a6fdb</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#1f57b8;"></div>
    <div class="nm">600</div><div class="hx">#1f57b8</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#1b4794;"></div>
    <div class="nm">700</div><div class="hx">#1b4794</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#1a3c78;"></div>
    <div class="nm">800</div><div class="hx">#1a3c78</div>
  </div>
  <div class="sw" style="width:58px">
    <div class="chip" style="background:#182f5c;"></div>
    <div class="nm">900</div><div class="hx">#182f5c</div>
  </div></div><div style="margin-top:14px;font-size:12px;color:var(--fg-muted)">Accent · blue. <b style="color:var(--fg-default)">500</b> is <code style="font-family:var(--font-mono)">--accent-emphasis</code> (primary buttons, links, selection, focus). The single accent of the system.</div>
</body>
</html>
